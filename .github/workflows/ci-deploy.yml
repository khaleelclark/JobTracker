name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: job-tracker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out tested commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.0.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @job-tracker/web exec prisma generate

      - name: Run test suite
        run: pnpm test

      - name: Type-check MCP server
        run: pnpm --filter @job-tracker/mcp-server build

      - name: Build web application
        run: pnpm --filter @job-tracker/web build

      - name: Lint GitHub Actions workflow
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

  deploy:
    name: Deploy local Docker services
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: [self-hosted, linux, x64, job-tracker]
    timeout-minutes: 30
    concurrency:
      group: job-tracker-production
      cancel-in-progress: false
    steps:
      - name: Check out tested commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy tested main commit with rollback
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: ./scripts/deploy.sh
